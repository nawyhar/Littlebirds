<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stories of the Prophets · Mes petits oisillons</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    :root {
      --gold: #D4AF37;
      --gold-bright: #FFD700;
      --gold-glow: rgba(212, 175, 55, 0.6);
      --dark-bg: #05080F;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: var(--dark-bg);
      font-family: 'Poppins', sans-serif;
      color: #f0f0f0;
      min-height: 100vh;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }

    /* Floating Dust */
    .particles {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background-image: radial-gradient(var(--gold) 0.5px, transparent 0.5px);
      background-size: 60px 60px;
      opacity: 0.15;
      animation: drift 30s linear infinite;
      z-index: -1;
    }

    @keyframes drift {
      from { transform: translateY(0); }
      to { transform: translateY(-60px); }
    }

    /* Discreet Language Selector */
    .language-selector {
      position: fixed;
      top: 1.5rem;
      display: flex;
      gap: 1.5rem;
      background: rgba(10, 15, 25, 0.8);
      backdrop-filter: blur(15px);
      padding: 0.5rem 2rem;
      border-radius: 3rem;
      border: 1px solid rgba(212, 175, 55, 0.3);
      z-index: 2000;
      box-shadow: 0 0 15px rgba(0,0,0,0.5);
    }

    .lang-option {
      font-family: 'Cinzel', serif;
      font-size: 0.8rem;
      font-weight: 700;
      color: rgba(212, 175, 55, 0.4);
      cursor: pointer;
      background: none; border: none;
      transition: 0.3s;
    }

    .lang-option.active {
      color: var(--gold-bright);
      text-shadow: 0 0 10px var(--gold-glow);
    }

    .app-container {
      max-width: 1000px;
      width: 100%;
      margin-top: 5rem;
      z-index: 10;
    }

    /* Intro Section with Luminous Frame */
    .intro-section {
      text-align: center;
      margin-bottom: 5rem;
      perspective: 1000px;
    }

    .intro-title {
      font-family: 'Cinzel', serif;
      font-size: 2.5rem;
      color: var(--gold);
      margin-bottom: 2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      text-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
    }

    .heart-icon {
      font-size: 1.2rem;
      color: var(--gold-bright);
      animation: pulse 2s infinite ease-in-out;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 0.5; filter: blur(1px); }
      50% { transform: scale(1.3); opacity: 1; filter: blur(0px); text-shadow: 0 0 15px var(--gold); }
    }

    .intro-card {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(212, 175, 55, 0.2);
      padding: 2.5rem;
      border-radius: 1.5rem;
      transition: all 0.6s cubic-bezier(0.165, 0.84, 0.44, 1);
      cursor: default;
    }

    .intro-card:hover {
      background: rgba(212, 175, 55, 0.04);
      border-color: var(--gold-bright);
      box-shadow: 0 0 40px rgba(212, 175, 55, 0.2);
      transform: scale(1.02);
    }

    .intro-text {
      font-size: 1.1rem;
      line-height: 2;
      color: rgba(255, 255, 255, 0.85);
      font-style: italic;
      font-weight: 300;
    }

    /* Grid & Luminous Video Cards */
    .prophets-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 2rem;
      padding-bottom: 5rem;
    }

    .prophet-card {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(212, 175, 55, 0.15);
      border-radius: 1.5rem;
      padding: 3rem 1.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: all 0.5s ease;
      position: relative;
    }

    .prophet-card:hover {
      transform: translateY(-10px);
      border-color: var(--gold-bright);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), 0 0 20px rgba(212, 175, 55, 0.2);
      background: rgba(255, 255, 255, 0.04);
    }

    /* Portrait Styling */
    .card-portrait {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      border: 1px solid rgba(212, 175, 55, 0.3);
      margin-bottom: 1.5rem;
      background-size: 70%;
      background-repeat: no-repeat;
      background-position: center;
      transition: 0.5s;
    }

    .prophet-card:hover .card-portrait {
      border-color: var(--gold-bright);
      transform: scale(1.1);
      box-shadow: 0 0 15px var(--gold-glow);
    }

    /* Adam's Tree Portrait */
    .portrait-adam { 
      background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><path d="M50 85 V60 M50 65 L35 50 M50 65 L65 50 M50 75 L40 70 M50 75 L60 70" stroke="%23D4AF37" stroke-width="2" fill="none"/><circle cx="35" cy="50" r="3" fill="%23D4AF37"/><circle cx="65" cy="50" r="3" fill="%23D4AF37"/><circle cx="50" cy="40" r="4" fill="%23D4AF37"/><path d="M30 40 Q50 10 70 40" stroke="%23D4AF37" stroke-width="1.5" fill="none"/></svg>');
    }

    .portrait-generic { 
      background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="30" fill="none" stroke="%23D4AF37" stroke-width="0.5" opacity="0.4"/></svg>');
    }

    .card-name { 
      font-family: 'Cinzel', serif; 
      font-size: 1.1rem; 
      color: var(--gold); 
      letter-spacing: 1.5px;
      transition: 0.3s;
    }

    .prophet-card:hover .card-name {
      color: var(--gold-bright);
      text-shadow: 0 0 10px var(--gold-glow);
    }

    /* Video Modal */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(3, 5, 10, 0.98);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 3000;
      visibility: hidden; opacity: 0;
      transition: 0.5s;
    }

    .modal-overlay.active { visibility: visible; opacity: 1; }

    .modal-content { max-width: 800px; width: 90%; text-align: center; }

    .video-frame {
      border: 1px solid var(--gold);
      border-radius: 1rem;
      overflow: hidden;
      box-shadow: 0 0 40px rgba(0,0,0,0.8);
    }

    .rtl { direction: rtl; }

    @media (max-width: 700px) {
      .intro-title { font-size: 1.8rem; }
      .intro-card { padding: 1.5rem; }
    }
  </style>
</head>
<body>

  <div class="particles"></div>

  <div class="language-selector">
    <button class="lang-option" id="langAR" data-lang="AR">AR</button>
    <button class="lang-option" id="langEN" data-lang="EN">EN</button>
    <button class="lang-option" id="langFR" data-lang="FR">FR</button>
  </div>

  <div class="app-container">
    <div class="intro-section">
      <h1 class="intro-title" id="mainTitle"></h1>
      <div class="intro-card">
        <div class="intro-text" id="dynamicIntro"></div>
      </div>
    </div>

    <div class="prophets-grid" id="prophetsGrid"></div>
  </div>

  <div class="modal-overlay" id="quickViewModal">
    <div class="modal-content">
      <h2 id="modalProphetName" style="font-family: 'Cinzel', serif; color: var(--gold-bright); font-size: 2rem; margin-bottom: 2rem;"></h2>
      <div class="video-frame" id="videoContainer" style="display: none;">
        <video id="prophetVideo" style="width:100%" controls><source src="" id="videoSource"></video>
      </div>
      <div id="progressMessage" style="display: none; color: var(--gold); font-style: italic; font-size: 1.2rem; padding: 2rem;"></div>
      <button onclick="closeModal()" style="margin-top: 2rem; background: none; border: 1px solid var(--gold); color: var(--gold); padding: 0.5rem 2rem; border-radius: 2rem; cursor: pointer; font-family: 'Cinzel';">Close</button>
    </div>
  </div>

<script>
  (function() {
    const prophetsData = [
      { id: "adam", names: { EN: "Adam", AR: "آدم", FR: "Adam" } },
      { id: "enoch", names: { EN: "Enoch (Idris)", AR: "إدريس", FR: "Idris (Enoch)" } },
      { id: "noah", names: { EN: "Noah (Nuh)", AR: "نوح", FR: "Nūh (Noé)" } },
      { id: "salih", names: { EN: "Salih", AR: "صالح", FR: "Sālih" } },
      { id: "lot", names: { EN: "Lot (Lut)", AR: "لوط", FR: "Lūt (Lot)" } },
      { id: "hud", names: { EN: "Hud", AR: "هود", FR: "Hūd" } },
      { id: "ibrahim", names: { EN: "Abraham (Ibrahim)", AR: "إبراهيم", FR: "Ibrāhīm (Abraham)" } },
      { id: "shoaib", names: { EN: "Shuaib", AR: "شعيب", FR: "Shu‘ayb" } },
      { id: "ismael", names: { EN: "Ishmael (Ismail)", AR: "إسماعيل", FR: "Ismā‘īl" } },
      { id: "isaac", names: { EN: "Isaac (Ishaq)", AR: "إسحاق", FR: "Ishāq (Isaac)" } },
      { id: "jacob", names: { EN: "Jacob (Yaqub)", AR: "يعقوب", FR: "Ya‘qūb (Jacob)" } },
      { id: "joseph", names: { EN: "Joseph (Yusuf)", AR: "يوسف", FR: "Yūsuf (Joseph)" } },
      { id: "job", names: { EN: "Job (Ayyub)", AR: "أيوب", FR: "Ayyūb (Job)" } },
      { id: "moses", names: { EN: "Moses & Aaron", AR: "موسى وهارون", FR: "Mūsā & Hārūn" } },
      { id: "ezekiel", names: { EN: "Ezekiel (Dhul-Kifl)", AR: "ذو الكفل", FR: "Dhūl-Kifl (Ézéchiel)" } },
      { id: "elijah", names: { EN: "Elijah & Elisha", AR: "إلياس واليسع", FR: "Ilyās & Alyasa‘" } },
      { id: "jonah", names: { EN: "Jonah (Yunus)", AR: "يونس", FR: "Yūnus (Jonas)" } },
      { id: "david", names: { EN: "David & Solomon", AR: "داود وسليمان", FR: "Dāwūd & Sulaymān" } },
      { id: "zakaria", names: { EN: "Zechariah & John", AR: "زكريا ويحيى", FR: "Zakariyyā & Yahyā" } },
      { id: "jesus", names: { EN: "Jesus (Isa)", AR: "عيسى", FR: "‘Īsā (Jésus)" } },
      { id: "muhammad", names: { EN: "Muhammad ⚘", AR: "محمد ﷺ", FR: "Muhammad ⚘" } }
    ];

    const translations = {
      EN: {
        title: "Stories of the Prophets",
        intro: "As the day ends and the lights grow soft, it is time for our stories to begin. This is where we gather for our special ritual to hear about the Prophets. Simple stories of kindness and courage for my little birds.",
        comingSoon: "This story is still being written in the stars for my little birds... ✨"
      },
      FR: {
        title: "Histoire des Prophètes",
        intro: "Tandis que le jour s'efface et que la maison s'apaise, le temps des histoires commence enfin. C'est le moment de notre rituel sacré pour écouter la vie des Prophètes. Des récits de courage pour mes petits oisillons.",
        comingSoon: "Cette histoire est encore en train d'être écrite dans les étoiles pour mes petits oisillons... ✨"
      },
      AR: {
        title: "قصص الأنبياء",
        intro: "مع هدوء النهار وبداية السكينة، يحين وقت حكاياتنا. هنا نلتفّ معاً في لمّتنا الهادئة لنستحضر سير الأنبياء؛ رحلات مليئة بالرحمة والسكينة لعصافيري الصغار.",
        comingSoon: "هذه القصة لا تزال تُكتب بين النجوم لعصافيري الصغار... ✨"
      }
    };

    const grid = document.getElementById('prophetsGrid');
    const modal = document.getElementById('quickViewModal');
    const video = document.getElementById('prophetVideo');
    const videoSource = document.getElementById('videoSource');
    const videoContainer = document.getElementById('videoContainer');
    const progressMessage = document.getElementById('progressMessage');
    
    function renderProphets(lang) {
      grid.innerHTML = '';
      prophetsData.forEach((prophet) => {
        const card = document.createElement('div');
        card.className = 'prophet-card';
        card.innerHTML = `<div class="card-portrait ${prophet.id === 'adam' ? 'portrait-adam' : 'portrait-generic'}"></div>
                          <div class="card-name">${prophet.names[lang]}</div>`;
        
        card.onclick = () => {
          document.getElementById('modalProphetName').textContent = prophet.names[lang];
          if(prophet.id === 'adam') {
            videoSource.src = `Video ${lang} mp4.mp4`;
            video.load();
            videoContainer.style.display = 'block';
            progressMessage.style.display = 'none';
          } else {
            videoContainer.style.display = 'none';
            progressMessage.textContent = translations[lang].comingSoon;
            progressMessage.style.display = 'block';
          }
          modal.classList.add('active');
        };
        grid.appendChild(card);
      });
    }

    function setLanguage(lang) {
      document.querySelectorAll('.lang-option').forEach(btn => btn.classList.toggle('active', btn.dataset.lang === lang));
      document.getElementById('mainTitle').innerHTML = `<i class="fas fa-heart heart-icon"></i> ${translations[lang].title} <i class="fas fa-heart heart-icon"></i>`;
      document.getElementById('dynamicIntro').innerHTML = translations[lang].intro;
      
      document.body.classList.toggle('rtl', lang === 'AR');
      document.body.dir = (lang === 'AR' ? 'rtl' : 'ltr');
      
      renderProphets(lang);
    }

    document.getElementById('langEN').onclick = () => setLanguage('EN');
    document.getElementById('langAR').onclick = () => setLanguage('AR');
    document.getElementById('langFR').onclick = () => setLanguage('FR');
    
    window.closeModal = () => {
        modal.classList.remove('active');
        video.pause();
    }

    setLanguage('EN');
  })();
</script>
</body>
</html>
