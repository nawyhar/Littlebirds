<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stories of the Prophets · Mes petits oisillons</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    :root {
      /* Deepened Celestial Blue - Midnight Chic */
      --celestial-midnight: #020817;
      --celestial-deep: #04122b;
      
      /* Vibrant Gold Palette */
      --gold-vibrant: #FFD700;
      --gold-glow-wide: rgba(255, 215, 0, 0.7);
      --gold-glow-soft: rgba(255, 215, 0, 0.3);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: var(--celestial-midnight);
      font-family: 'Poppins', sans-serif;
      color: #f0f0f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
      /* Deeper radial gradient for a more "space" feel */
      background-image: radial-gradient(circle at 50% 40%, var(--celestial-deep) 0%, var(--celestial-midnight) 85%);
      background-attachment: fixed;
    }

    .particles {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background-image: radial-gradient(var(--gold-vibrant) 0.8px, transparent 0.8px);
      background-size: 70px 70px;
      opacity: 0.15;
      animation: drift 50s linear infinite;
      z-index: -1;
    }

    @keyframes drift {
      from { transform: translateY(0); }
      to { transform: translateY(-70px); }
    }

    /* Discreet Selector */
    .language-selector {
      position: fixed;
      top: 1.5rem;
      display: flex;
      gap: 1.5rem;
      background: rgba(2, 8, 23, 0.85);
      backdrop-filter: blur(20px);
      padding: 0.6rem 2.5rem;
      border-radius: 3rem;
      border: 1px solid rgba(255, 215, 0, 0.4);
      z-index: 2000;
      box-shadow: 0 5px 20px rgba(0,0,0,0.6);
    }

    .lang-option {
      font-family: 'Cinzel', serif;
      font-size: 0.85rem;
      font-weight: 700;
      color: rgba(255, 215, 0, 0.5);
      cursor: pointer;
      background: none; border: none;
      transition: 0.3s;
      letter-spacing: 1px;
    }

    .lang-option.active {
      color: var(--gold-vibrant);
      text-shadow: 0 0 10px var(--gold-glow-wide);
    }

    .app-container {
      max-width: 1050px;
      width: 100%;
      margin-top: 6rem;
      z-index: 10;
    }

    .intro-section {
      text-align: center;
      margin-bottom: 5rem;
    }

    .intro-title {
      font-family: 'Cinzel', serif;
      font-size: 2.8rem;
      color: var(--gold-vibrant);
      margin-bottom: 2.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      text-shadow: 0 0 20px var(--gold-glow-soft);
    }

    .heart-icon {
      font-size: 1.4rem;
      color: var(--gold-vibrant);
      animation: pulse 2.5s infinite ease-in-out;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 0.7; }
      50% { transform: scale(1.3); opacity: 1; text-shadow: 0 0 15px var(--gold-vibrant); }
    }

    /* Common Card Styling (Intro + Prophets) */
    .highlight-card {
      background: rgba(255, 255, 255, 0.03);
      border: 4px solid var(--gold-vibrant);
      border-radius: 2rem;
      box-shadow: 0 0 20px var(--gold-glow-soft);
      transition: all 0.5s cubic-bezier(0.165, 0.84, 0.44, 1);
    }

    .highlight-card:hover {
      background: rgba(255, 255, 255, 0.06);
      border-color: var(--gold-vibrant);
      box-shadow: 0 0 45px var(--gold-glow-wide);
      transform: translateY(-8px) scale(1.01);
    }

    .intro-card {
      padding: 3rem;
      cursor: default;
    }

    .intro-text {
      font-size: 1.2rem;
      line-height: 2.2;
      color: #fff;
      font-style: italic;
      font-weight: 300;
    }

    /* Grid */
    .prophets-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 3rem;
      padding-bottom: 6rem;
    }

    .prophet-card {
      padding: 4rem 1.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
    }

    /* Portrait Styling */
    .card-portrait {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      margin-bottom: 2rem;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      border: 2px solid var(--gold-vibrant);
      transition: transform 0.4s ease;
    }

    .prophet-card:hover .card-portrait {
      transform: scale(1.15);
      box-shadow: 0 0 25px var(--gold-glow-wide);
    }

    /* Celestial Tree Adam */
    .portrait-adam { 
      background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><path d="M50 90 C48 70, 48 60, 48 45 L52 45 C52 60, 54 70, 52 90 Z" fill="%23FFD700"/><path d="M50 50 C25 50, 15 35, 20 20 C25 5, 45 5, 50 15 C55 5, 75 5, 80 20 C85 35, 75 50, 50 50 Z M50 25 C60 20, 70 25, 70 35 C70 45, 60 50, 50 45 M50 25 C40 20, 30 25, 30 35 C30 45, 40 50, 50 45" fill="%23FFD700" opacity="0.8"/><circle cx="50" cy="12" r="5" fill="%23FFD700" opacity="0.9"/><circle cx="20" cy="20" r="4" fill="%23FFD700" opacity="0.7"/><circle cx="80" cy="20" r="4" fill="%23FFD700" opacity="0.7"/></svg>');
      background-size: 80%;
      background-color: rgba(255, 215, 0, 0.05);
    }

    .portrait-generic { 
      background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="30" fill="none" stroke="%23FFD700" stroke-width="1" opacity="0.4"/></svg>');
    }

    .card-name { 
      font-family: 'Cinzel', serif; 
      font-size: 1.25rem; 
      color: var(--gold-vibrant); 
      letter-spacing: 2px;
      text-shadow: 0 0 10px rgba(0,0,0,0.5);
    }

    .modal-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(1, 4, 12, 0.98);
      display: flex; align-items: center; justify-content: center;
      z-index: 3000; visibility: hidden; opacity: 0; transition: 0.5s;
    }

    .modal-overlay.active { visibility: visible; opacity: 1; }

    .video-frame {
      border: 3px solid var(--gold-vibrant);
      border-radius: 1.5rem;
      overflow: hidden;
      box-shadow: 0 0 60px var(--gold-glow-soft);
    }

    .rtl { direction: rtl; }

    @media (max-width: 700px) {
      .intro-title { font-size: 2rem; }
      .highlight-card { border-width: 3px; }
    }
  </style>
</head>
<body>

  <div class="particles"></div>

  <div class="language-selector">
    <button class="lang-option" id="langAR" data-lang="AR">AR</button>
    <button class="lang-option" id="langEN" data-lang="EN">EN</button>
    <button class="lang-option" id="langFR" data-lang="FR">FR</button>
  </div>

  <div class="app-container">
    <div class="intro-section">
      <h1 class="intro-title" id="mainTitle"></h1>
      <div class="intro-card highlight-card">
        <div class="intro-text" id="dynamicIntro"></div>
      </div>
    </div>

    <div class="prophets-grid" id="prophetsGrid"></div>
  </div>

  <div class="modal-overlay" id="quickViewModal">
    <div class="modal-content" style="max-width: 850px; width: 90%; text-align: center;">
      <h2 id="modalProphetName" style="font-family: 'Cinzel', serif; color: var(--gold-vibrant); font-size: 2.2rem; margin-bottom: 2rem;"></h2>
      <div class="video-frame" id="videoContainer" style="display: none;">
        <video id="prophetVideo" style="width:100%" controls><source src="" id="videoSource"></video>
      </div>
      <div id="progressMessage" style="display: none; color: var(--gold-vibrant); font-style: italic; font-size: 1.3rem; padding: 2rem;"></div>
      <button onclick="closeModal()" style="margin-top: 2rem; background: none; border: 2px solid var(--gold-vibrant); color: var(--gold-vibrant); padding: 0.6rem 2.5rem; border-radius: 2rem; cursor: pointer; font-family: 'Cinzel'; font-weight: bold;">Close</button>
    </div>
  </div>

<script>
  (function() {
    const prophetsData = [
      { id: "adam", names: { EN: "Adam", AR: "آدم", FR: "Adam" } },
      { id: "enoch", names: { EN: "Enoch (Idris)", AR: "إدريس", FR: "Idris (Enoch)" } },
      { id: "noah", names: { EN: "Noah (Nuh)", AR: "نوح", FR: "Nūh (Noé)" } },
      { id: "salih", names: { EN: "Salih", AR: "صالح", FR: "Sālih" } },
      { id: "lot", names: { EN: "Lot (Lut)", AR: "لوط", FR: "Lūt (Lot)" } },
      { id: "hud", names: { EN: "Hud", AR: "هود", FR: "Hūd" } },
      { id: "ibrahim", names: { EN: "Abraham (Ibrahim)", AR: "إبراهيم", FR: "Ibrāhīm (Abraham)" } },
      { id: "shoaib", names: { EN: "Shuaib", AR: "شعيب", FR: "Shu‘ayb" } },
      { id: "ismael", names: { EN: "Ishmael (Ismail)", AR: "إسماعيل", FR: "Ismā‘īl" } },
      { id: "isaac", names: { EN: "Isaac (Ishaq)", AR: "إسحاق", FR: "Ishāq (Isaac)" } },
      { id: "jacob", names: { EN: "Jacob (Yaqub)", AR: "يعقوب", FR: "Ya‘qūb (Jacob)" } },
      { id: "joseph", names: { EN: "Joseph (Yusuf)", AR: "يوسف", FR: "Yūsuf (Joseph)" } },
      { id: "job", names: { EN: "Job (Ayyub)", AR: "أيوب", FR: "Ayyūb (Job)" } },
      { id: "moses", names: { EN: "Moses & Aaron", AR: "موسى وهارون", FR: "Mūsā & Hārūn" } },
      { id: "ezekiel", names: { EN: "Ezekiel (Dhul-Kifl)", AR: "ذو الكفل", FR: "Dhūl-Kifl (Ézéchiel)" } },
      { id: "elijah", names: { EN: "Elijah & Elisha", AR: "إلياس واليسع", FR: "Ilyās & Alyasa‘" } },
      { id: "jonah", names: { EN: "Jonah (Yunus)", AR: "يونس", FR: "Yūnus (Jonas)" } },
      { id: "david", names: { EN: "David & Solomon", AR: "داود وسليمان", FR: "Dāwūd & Sulaymān" } },
      { id: "zakaria", names: { EN: "Zechariah & John", AR: "زكريا ويحيى", FR: "Zakariyyā & Yahyā" } },
      { id: "jesus", names: { EN: "Jesus (Isa)", AR: "عيسى", FR: "‘Īsā (Jésus)" } },
      { id: "muhammad", names: { EN: "Muhammad ⚘", AR: "محمد ﷺ", FR: "Muhammad ⚘" } }
    ];

    const translations = {
      EN: { title: "Stories of the Prophets", intro: "As the day ends and the lights grow soft, it is time for our stories to begin. This is where we gather for our special ritual to hear about the Prophets. Simple stories of kindness and courage for my little birds.", comingSoon: "This story is still being written in the stars for my little birds... ✨" },
      FR: { title: "Histoire des Prophètes", intro: "Tandis que le jour s'efface et que la maison s'apaise, le temps des histoires commence enfin. C'est le moment de notre rituel sacré pour écouter la vie des Prophètes. Des récits de courage pour mes petits oisillons.", comingSoon: "Cette histoire est encore en train d'être écrite dans les étoiles pour mes petits oisillons... ✨" },
      AR: { title: "قصص الأنبياء", intro: "مع هدوء النهار وبداية السكينة، يحين وقت حكاياتنا. هنا نلتفّ معاً في لمّتنا الهادئة لنستحضر سير الأنبياء؛ رحلات مليئة بالرحمة والسكينة لعصافيري الصغار.", comingSoon: "هذه القصة لا تزال تُكتب بين النجوم لعصافيري الصغار... ✨" }
    };

    const grid = document.getElementById('prophetsGrid');
    const modal = document.getElementById('quickViewModal');
    const video = document.getElementById('prophetVideo');
    const videoSource = document.getElementById('videoSource');
    const videoContainer = document.getElementById('videoContainer');
    const progressMessage = document.getElementById('progressMessage');
    
    function renderProphets(lang) {
      grid.innerHTML = '';
      prophetsData.forEach((prophet) => {
        const card = document.createElement('div');
        card.className = 'prophet-card highlight-card';
        card.innerHTML = `<div class="card-portrait ${prophet.id === 'adam' ? 'portrait-adam' : 'portrait-generic'}"></div>
                          <div class="card-name">${prophet.names[lang]}</div>`;
        
        card.onclick = () => {
          document.getElementById('modalProphetName').textContent = prophet.names[lang];
          if(prophet.id === 'adam') {
            videoSource.src = `Video ${lang} mp4.mp4`;
            video.load();
            videoContainer.style.display = 'block';
            progressMessage.style.display = 'none';
          } else {
            videoContainer.style.display = 'none';
            progressMessage.textContent = translations[lang].comingSoon;
            progressMessage.style.display = 'block';
          }
          modal.classList.add('active');
        };
        grid.appendChild(card);
      });
    }

    function setLanguage(lang) {
      document.querySelectorAll('.lang-option').forEach(btn => btn.classList.toggle('active', btn.dataset.lang === lang));
      document.getElementById('mainTitle').innerHTML = `<i class="fas fa-heart heart-icon"></i> ${translations[lang].title} <i class="fas fa-heart heart-icon"></i>`;
      document.getElementById('dynamicIntro').innerHTML = translations[lang].intro;
      document.body.classList.toggle('rtl', lang === 'AR');
      document.body.dir = (lang === 'AR' ? 'rtl' : 'ltr');
      renderProphets(lang);
    }

    document.getElementById('langEN').onclick = () => setLanguage('EN');
    document.getElementById('langAR').onclick = () => setLanguage('AR');
    document.getElementById('langFR').onclick = () => setLanguage('FR');
    window.closeModal = () => { modal.classList.remove('active'); video.pause(); }
    setLanguage('EN');
  })();
</script>
</body>
</html>
