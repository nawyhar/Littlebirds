<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stories of the Prophets · Mes petits oisillons</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: #0B1320;
      font-family: 'Poppins', sans-serif;
      color: #f0f0f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
      background-image: radial-gradient(circle at 50% 50%, rgba(212, 175, 55, 0.05) 0%, transparent 50%),
                        linear-gradient(145deg, #0b1320 0%, #080d16 100%);
    }

    /* Fixed Minimalist Language Selector */
    .language-selector {
      position: fixed;
      top: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 1.5rem;
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(10px);
      padding: 0.5rem 1.5rem;
      border-radius: 2rem;
      border: 1px solid rgba(212, 175, 55, 0.2);
      z-index: 2000;
    }

    .lang-option {
      font-family: 'Cinzel', serif;
      font-size: 0.9rem;
      font-weight: 600;
      color: rgba(212, 175, 55, 0.6);
      cursor: pointer;
      background: none;
      border: none;
      transition: 0.3s;
      letter-spacing: 1px;
    }

    .lang-option.active {
      color: #D4AF37;
      text-shadow: 0 0 10px rgba(212, 175, 55, 0.5);
    }

    .app-container {
      max-width: 1000px;
      width: 100%;
      margin-top: 4rem; /* Space for the fixed header */
      padding: 0;
    }

    .intro-section { 
      text-align: center; 
      margin-bottom: 4rem; 
      padding: 0 1rem;
    }

    .intro-title {
      font-family: 'Cinzel', serif;
      font-size: 2.5rem;
      color: #D4AF37;
      margin-bottom: 2rem;
      font-weight: 400;
      letter-spacing: 2px;
    }

    .intro-text {
      font-size: 1.1rem;
      line-height: 1.9;
      max-width: 900px;
      margin: 0 auto;
      color: rgba(240, 240, 240, 0.8);
      font-style: italic;
      font-weight: 300;
      border-left: 1px solid rgba(212, 175, 55, 0.3);
      border-right: 1px solid rgba(212, 175, 55, 0.3);
      padding: 1rem 2.5rem;
    }

    .prophets-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 2rem;
      padding-bottom: 4rem;
    }

    .prophet-card {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(212, 175, 55, 0.15);
      border-radius: 1.5rem;
      padding: 2.5rem 1.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
      cursor: pointer;
    }

    .prophet-card:hover {
      background: rgba(255, 255, 255, 0.04);
      border-color: rgba(212, 175, 55, 0.5);
      transform: translateY(-8px);
      box-shadow: 0 15px 30px rgba(0,0,0,0.4);
    }

    .card-portrait {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: 1px solid rgba(212, 175, 55, 0.3);
      margin-bottom: 1.5rem;
      background-size: cover;
      background-position: center;
      transition: 0.4s;
    }

    .prophet-card:hover .card-portrait {
      border-color: #D4AF37;
      transform: scale(1.1);
    }

    .portrait-adam { 
      background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><path d="M48 85 C46 70, 48 60, 48 50 L52 50 C52 60, 54 70, 52 85 Z" fill="%23D4AF37" opacity="0.8"/><path d="M50 60 C30 65, 10 55, 15 40 C20 25, 40 20, 50 30 C60 20, 80 25, 85 40 C90 55, 70 65, 50 60 Z" fill="%23D4AF37" opacity="0.6"/></svg>');
    }

    .portrait-generic { 
      background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="40" fill="none" stroke="%23D4AF37" stroke-width="1" opacity="0.4"/></svg>');
    }

    .card-name { 
      font-family: 'Cinzel', serif; 
      font-size: 1.1rem; 
      color: #D4AF37; 
      text-align: center; 
      letter-spacing: 1px;
    }

    /* Modal Styling */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(7, 11, 19, 0.98);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 3000;
      visibility: hidden;
      opacity: 0;
      transition: 0.4s;
    }

    .modal-overlay.active { visibility: visible; opacity: 1; }

    .modal-content {
      max-width: 900px;
      width: 90%;
      text-align: center;
      position: relative;
    }

    .close-modal { 
      position: absolute; 
      top: -4rem; 
      right: 0; 
      background: none; 
      border: none; 
      font-size: 2rem; 
      color: #D4AF37; 
      cursor: pointer; 
      opacity: 0.6;
      transition: 0.3s;
    }
    
    .close-modal:hover { opacity: 1; }

    .video-container { 
      width: 100%; 
      margin-top: 1rem; 
      border-radius: 0.5rem; 
      overflow: hidden; 
      box-shadow: 0 20px 40px rgba(0,0,0,0.6);
      border: 1px solid rgba(212, 175, 55, 0.2);
    }

    video { width: 100%; display: block; }

    .progress-message {
      margin-top: 2rem;
      font-size: 1.2rem;
      color: #D4AF37;
      font-weight: 300;
      letter-spacing: 1px;
    }

    .rtl { direction: rtl; }
    .rtl .intro-text { border-left: none; border-right: none; border-top: 1px solid rgba(212, 175, 55, 0.3); border-bottom: 1px solid rgba(212, 175, 55, 0.3); }

    @media (max-width: 700px) {
      .intro-title { font-size: 1.8rem; }
      .intro-text { padding: 1rem; font-size: 1rem; }
      .language-selector { width: 90%; justify-content: center; }
    }
  </style>
</head>
<body>

  <div class="language-selector">
    <button class="lang-option" id="langAR" data-lang="AR">AR</button>
    <button class="lang-option" id="langEN" data-lang="EN">EN</button>
    <button class="lang-option" id="langFR" data-lang="FR">FR</button>
  </div>

  <div class="app-container">
    <div class="intro-section">
      <h1 class="intro-title" id="mainTitle"></h1>
      <div class="intro-text"><span id="dynamicIntro"></span></div>
    </div>

    <div class="prophets-grid" id="prophetsGrid"></div>
  </div>

  <div class="modal-overlay" id="quickViewModal">
    <div class="modal-content">
      <button class="close-modal" id="closeModalBtn"><i class="fas fa-times"></i></button>
      <h2 id="modalProphetName" style="font-family: 'Cinzel', serif; color: #D4AF37; font-size: 1.8rem; font-weight: 400; margin-bottom: 1rem;"></h2>
      
      <div class="video-container" id="videoContainer" style="display: none;">
        <video id="prophetVideo" controls>
          <source src="" type="video/mp4" id="videoSource">
        </video>
      </div>

      <div id="progressMessage" class="progress-message" style="display: none;"></div>
    </div>
  </div>

<script>
  (function() {
    const prophetsData = [
      { id: "adam", names: { EN: "Adam", AR: "آدم", FR: "Adam" } },
      { id: "enoch", names: { EN: "Enoch (Idris)", AR: "إدريس", FR: "Idris (Enoch)" } },
      { id: "noah", names: { EN: "Noah (Nuh)", AR: "نوح", FR: "Nūh (Noé)" } },
      { id: "salih", names: { EN: "Salih", AR: "صالح", FR: "Sālih" } },
      { id: "lot", names: { EN: "Lot (Lut)", AR: "لوط", FR: "Lūt (Lot)" } },
      { id: "hud", names: { EN: "Hud", AR: "هود", FR: "Hūd" } },
      { id: "ibrahim", names: { EN: "Abraham (Ibrahim)", AR: "إبراهيم", FR: "Ibrāhīm (Abraham)" } },
      { id: "shoaib", names: { EN: "Shuaib", AR: "شعيب", FR: "Shu‘ayb" } },
      { id: "ismael", names: { EN: "Ishmael (Ismail)", AR: "إسماعيل", FR: "Ismā‘īl" } },
      { id: "isaac", names: { EN: "Isaac (Ishaq)", AR: "إسحاق", FR: "Ishāq (Isaac)" } },
      { id: "jacob", names: { EN: "Jacob (Yaqub)", AR: "يعقوب", FR: "Ya‘qūb (Jacob)" } },
      { id: "joseph", names: { EN: "Joseph (Yusuf)", AR: "يوسف", FR: "Yūsuf (Joseph)" } },
      { id: "job", names: { EN: "Job (Ayyub)", AR: "أيوب", FR: "Ayyūb (Job)" } },
      { id: "moses", names: { EN: "Moses & Aaron", AR: "موسى وهارون", FR: "Mūsā & Hārūn" } },
      { id: "ezekiel", names: { EN: "Ezekiel (Dhul-Kifl)", AR: "ذو الكفل", FR: "Dhūl-Kifl (Ézéchiel)" } },
      { id: "elijah", names: { EN: "Elijah & Elisha", AR: "إلياس واليسع", FR: "Ilyās & Alyasa‘" } },
      { id: "jonah", names: { EN: "Jonah (Yunus)", AR: "يونس", FR: "Yūnus (Jonas)" } },
      { id: "david", names: { EN: "David & Solomon", AR: "داود وسليمان", FR: "Dāwūd & Sulaymān" } },
      { id: "zakaria", names: { EN: "Zechariah & John", AR: "زكريا ويحيى", FR: "Zakariyyā & Yahyā" } },
      { id: "jesus", names: { EN: "Jesus (Isa)", AR: "عيسى", FR: "‘Īsā (Jésus)" } },
      { id: "muhammad", names: { EN: "Muhammad ⚘", AR: "محمد ﷺ", FR: "Muhammad ⚘" } }
    ];

    const translations = {
      EN: {
        title: "Prophets",
        intro: "As the day ends and the lights grow soft, it is time for our stories to begin. This is where we gather for our special ritual to hear about the Prophets. These are simple stories of kindness and courage that can light up any heart. It is a moment of peace for my little birds.",
        comingSoon: "This story is still being written in the stars for my little birds... ✨"
      },
      FR: {
        title: "Prophètes",
        intro: "Tandis que le jour s'efface et que la maison s'apaise, le temps des histoires commence enfin. C'est le moment où nous nous retrouvons pour ce rituel qui nous est cher. Leurs parcours sont des lumières qui parlent à chaque cœur. Un instant de sérénité pour mes petits oisillons.",
        comingSoon: "Cette histoire est encore en train d'être écrite dans les étoiles pour mes petits oisillons... ✨"
      },
      AR: {
        title: "الأنبياء",
        intro: "مع هدوء النهار وبداية السكينة، يحين وقت حكاياتنا. هنا نلتفّ معاً في لمّتنا الهادئة لنستحضر سير الأنبياء؛ تلك الرحلات المليئة بالرحمة والعزيمة التي تلمس كل وجدان. هي لحظة صفاء لعصافيري الصغار.",
        comingSoon: "هذه القصة لا تزال تُكتب بين النجوم لعصافيري الصغار... ✨"
      }
    };

    const grid = document.getElementById('prophetsGrid');
    const modal = document.getElementById('quickViewModal');
    const video = document.getElementById('prophetVideo');
    const videoSource = document.getElementById('videoSource');
    const videoContainer = document.getElementById('videoContainer');
    const progressMessage = document.getElementById('progressMessage');
    
    function renderProphets(lang) {
      grid.innerHTML = '';
      prophetsData.forEach((prophet) => {
        const card = document.createElement('div');
        card.className = 'prophet-card';
        card.innerHTML = `<div class="card-portrait ${prophet.id === 'adam' ? 'portrait-adam' : 'portrait-generic'}"></div>
                          <div class="card-name">${prophet.names[lang]}</div>`;
        
        card.onclick = () => {
          document.getElementById('modalProphetName').textContent = prophet.names[lang];
          if(prophet.id === 'adam') {
            videoSource.src = `Video ${lang} mp4.mp4`;
            video.load();
            videoContainer.style.display = 'block';
            progressMessage.style.display = 'none';
          } else {
            videoContainer.style.display = 'none';
            progressMessage.textContent = translations[lang].comingSoon;
            progressMessage.style.display = 'block';
          }
          modal.classList.add('active');
        };
        grid.appendChild(card);
      });
    }

    function setLanguage(lang) {
      document.querySelectorAll('.lang-option').forEach(btn => btn.classList.toggle('active', btn.dataset.lang === lang));
      document.getElementById('mainTitle').textContent = translations[lang].title;
      document.getElementById('dynamicIntro').innerHTML = translations[lang].intro;
      
      const container = document.body;
      if(lang === 'AR') { container.classList.add('rtl'); container.setAttribute('dir', 'rtl'); }
      else { container.classList.remove('rtl'); container.setAttribute('dir', 'ltr'); }
      
      renderProphets(lang);
    }

    document.getElementById('langEN').onclick = () => setLanguage('EN');
    document.getElementById('langAR').onclick = () => setLanguage('AR');
    document.getElementById('langFR').onclick = () => setLanguage('FR');
    
    function closeModal() {
        modal.classList.remove('active');
        video.pause();
    }

    document.getElementById('closeModalBtn').onclick = closeModal;
    modal.onclick = (e) => { if (e.target === modal) closeModal(); };

    setLanguage('EN');
  })();
</script>
</body>
</html>
