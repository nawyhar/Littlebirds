<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stories of the Prophets · Mes petits oisillons</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: #0B1320;
      font-family: 'Poppins', sans-serif;
      color: #f0f0f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      background-image: radial-gradient(circle at 30% 40%, rgba(212, 175, 55, 0.08) 0%, transparent 40%),
                        radial-gradient(circle at 80% 70%, rgba(212, 175, 55, 0.05) 0%, transparent 45%),
                        linear-gradient(145deg, #0b1320 0%, #0f1a2b 100%);
    }

    .app-container {
      max-width: 1200px;
      width: 100%;
      margin: 0 auto;
      border-radius: 2.5rem;
      background: rgba(10, 20, 35, 0.35);
      backdrop-filter: blur(4px);
      box-shadow: 0 25px 50px -8px rgba(0,0,0,0.8), 0 0 0 1px rgba(212, 175, 55, 0.25) inset;
      overflow: hidden;
      padding: 2rem 1.5rem;
    }

    .global-header {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 2.5rem;
    }

    .globe-icon {
      font-size: 4rem;
      color: #D4AF37;
      filter: drop-shadow(0 0 30px #f5c542);
      animation: rotateGlobe 20s infinite linear;
      margin-bottom: 0.8rem;
    }

    @keyframes rotateGlobe {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .language-selector {
      display: flex;
      gap: 2rem;
      background: rgba(0, 0, 0, 0.4);
      padding: 0.8rem 2rem;
      border-radius: 4rem;
      border: 1px solid #D4AF37;
    }

    .lang-option {
      font-family: 'Cinzel', serif;
      font-size: 1.8rem;
      font-weight: 700;
      color: #D4AF37;
      cursor: pointer;
      background: none;
      border: none;
      transition: 0.2s;
    }

    .lang-option.active {
      color: #fff2bf;
      text-shadow: 0 0 20px gold;
      border-bottom: 2px solid #fff2bf;
    }

    .intro-section { text-align: center; margin-bottom: 2.5rem; }

    .intro-title {
      font-family: 'Cinzel', serif;
      font-size: 2.2rem;
      color: #D4AF37;
      margin-bottom: 1.5rem;
      text-shadow: 0 0 20px gold;
    }

    .intro-text {
      font-size: 1.15rem;
      line-height: 1.8;
      max-width: 850px;
      margin: 0 auto;
      background: rgba(0, 0, 0, 0.4);
      padding: 2rem;
      border-radius: 2rem;
      border-top: 1px solid rgba(212, 175, 55, 0.3);
      border-bottom: 1px solid rgba(212, 175, 55, 0.3);
      font-style: italic;
    }

    .heart-icon { color: #D4AF37; margin: 0 0.5rem; animation: pulse 2s infinite; vertical-align: middle; }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.1); }
      100% { transform: scale(1); }
    }

    .prophets-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1.5rem;
      max-width: 900px;
      margin: 0 auto;
    }

    .prophet-card {
      background: rgba(255, 255, 255, 0.05);
      border: 2px solid #D4AF37;
      border-radius: 1.8rem;
      padding: 1.5rem 1rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: 0.3s;
      cursor: pointer;
    }

    .prophet-card:hover { transform: translateY(-5px); border-color: #fff; box-shadow: 0 10px 20px rgba(212, 175, 55, 0.3); }

    .card-portrait {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      border: 3px solid #D4AF37;
      margin-bottom: 1rem;
      background-size: cover;
      background-repeat: no-repeat;
      background-position: center;
      background-color: #0d1b2a;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* === NOUVEL ARBRE NATUREL ET TOUFFU (Inspiré de la référence) === */
    .portrait-adam { 
      background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><path d="M48 85 C46 70, 48 60, 48 50 L52 50 C52 60, 54 70, 52 85 Z" fill="%23D4AF37" stroke="%23A6822B" stroke-width="1"/><path d="M50 60 C30 65, 10 55, 15 40 C20 25, 40 20, 50 30 C60 20, 80 25, 85 40 C90 55, 70 65, 50 60 Z M50 35 C65 30, 75 35, 75 45 C75 55, 65 60, 50 55 M50 35 C35 30, 25 35, 25 45 C25 55, 35 60, 50 55" fill="%23D4AF37" opacity="0.95" stroke="%23D4AF37" stroke-width="1"/><circle cx="35" cy="40" r="1.5" fill="white" opacity="0.6"/><circle cx="65" cy="40" r="1.5" fill="white" opacity="0.6"/><circle cx="50" cy="25" r="1.5" fill="white" opacity="0.6"/><circle cx="30" cy="50" r="1" fill="white" opacity="0.5"/><circle cx="70" cy="50" r="1" fill="white" opacity="0.5"/><path d="M48 85 L52 85 Z" fill="white" opacity="0.3" stroke="%23D4AF37" stroke-width="3"/></svg>');
      filter: drop-shadow(0 0 15px rgba(212, 175, 55, 0.9));
    }

    .portrait-generic { background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="45" fill="%23c29a64"/><path d="M30 68 Q50 88,70 68" stroke="%23332" stroke-width="5" fill="none"/></svg>'); background-size: 70%;}

    .card-name { font-family: 'Cinzel', serif; font-size: 1.25rem; color: #D4AF37; text-align: center; text-shadow: 0 0 10px gold;}

    .modal-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.9);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      visibility: hidden;
      opacity: 0;
      transition: 0.3s;
    }

    .modal-overlay.active { visibility: visible; opacity: 1; }

    .modal-content {
      background: #0B1320;
      border: 2px solid #D4AF37;
      border-radius: 2rem;
      max-width: 800px;
      width: 95%;
      padding: 2rem;
      text-align: center;
      position: relative;
      box-shadow: 0 0 50px rgba(212, 175, 55, 0.5);
    }

    .close-modal { position: absolute; top: 1rem; right: 1.5rem; background: none; border: none; font-size: 2.5rem; color: #D4AF37; cursor: pointer; }

    .video-container { width: 100%; margin: 1.5rem 0; border-radius: 1.5rem; overflow: hidden; border: 1px solid #D4AF37; background: #000;}

    video { width: 100%; display: block; }

    .rtl { direction: rtl; }

    @media (max-width: 700px) { .prophets-grid { grid-template-columns: 1fr; } .modal-content { padding: 1.5rem; } }
  </style>
</head>
<body>
<div class="app-container">
  <div class="global-header">
    <i class="fas fa-globe-asia globe-icon"></i>
    <div class="language-selector">
      <button class="lang-option" id="langEN" data-lang="EN">EN</button>
      <button class="lang-option" id="langAR" data-lang="AR">AR</button>
      <button class="lang-option" id="langFR" data-lang="FR">FR</button>
    </div>
  </div>

  <div class="intro-section" id="introContainer">
    <h1 class="intro-title" id="mainTitle"></h1>
    <div class="intro-text">
      <span id="dynamicIntro"></span>
    </div>
  </div>

  <div class="prophets-grid" id="prophetsGrid"></div>
</div>

<div class="modal-overlay" id="quickViewModal">
  <div class="modal-content">
    <button class="close-modal" id="closeModalBtn">&times;</button>
    <h2 class="modal-title" id="modalProphetName" style="font-family: 'Cinzel', serif; color: #D4AF37; font-size: 2rem; text-shadow: 0 0 15px gold;"></h2>
    <div class="video-container" id="videoContainer">
      <video id="prophetVideo" controls>
        <source src="" type="video/mp4" id="videoSource">
      </video>
    </div>
    <p style="color: #D4AF37; font-style: italic;" id="modalFooter"></p>
  </div>
</div>

<script>
  (function() {
    const prophetsData = [
      { id: "adam", names: { EN: "Adam", AR: "آدم", FR: "Adam" } },
      { id: "enoch", names: { EN: "Enoch (Idris)", AR: "إدريس", FR: "Idris (Enoch)" } },
      { id: "noah", names: { EN: "Noah (Nuh)", AR: "نوح", FR: "Nūh (Noé)" } },
      { id: "salih", names: { EN: "Salih", AR: "صالح", FR: "Sālih" } },
      { id: "lot", names: { EN: "Lot (Lut)", AR: "لوط", FR: "Lūt (Lot)" } },
      { id: "hud", names: { EN: "Hud", AR: "هود", FR: "Hūd" } },
      { id: "ibrahim", names: { EN: "Abraham (Ibrahim)", AR: "إبراهيم", FR: "Ibrāhīm (Abraham)" } },
      { id: "shoaib", names: { EN: "Shuaib", AR: "شعيب", FR: "Shu‘ayb" } },
      { id: "ismael", names: { EN: "Ishmael (Ismail)", AR: "إسماعيل", FR: "Ismā‘īl" } },
      { id: "isaac", names: { EN: "Isaac (Ishaq)", AR: "إسحاق", FR: "Ishāq (Isaac)" } },
      { id: "jacob", names: { EN: "Jacob (Yaqub)", AR: "يعقوب", FR: "Ya‘qūb (Jacob)" } },
      { id: "joseph", names: { EN: "Joseph (Yusuf)", AR: "يوسف", FR: "Yūsuf (Joseph)" } },
      { id: "job", names: { EN: "Job (Ayyub)", AR: "أيوب", FR: "Ayyūb (Job)" } },
      { id: "moses", names: { EN: "Moses & Aaron", AR: "موسى وهارون", FR: "Mūsā & Hārūn" } },
      { id: "ezekiel", names: { EN: "Ezekiel (Dhul-Kifl)", AR: "ذو الكفل", FR: "Dhūl-Kifl (Ézéchiel)" } },
      { id: "elijah", names: { EN: "Elijah & Elisha", AR: "إلياس واليسع", FR: "Ilyās & Alyasa‘" } },
      { id: "jonah", names: { EN: "Jonah (Yunus)", AR: "يونس", FR: "Yūnus (Jonas)" } },
      { id: "david", names: { EN: "David & Solomon", AR: "داود وسليمان", FR: "Dāwūd & Sulaymān" } },
      { id: "zakaria", names: { EN: "Zechariah & John", AR: "زكريا ويحيى", FR: "Zakariyyā & Yahyā" } },
      { id: "jesus", names: { EN: "Jesus (Isa)", AR: "عيسى", FR: "‘Īsā (Jésus)" } },
      { id: "muhammad", names: { EN: "Muhammad ⚘", AR: "محمد ﷺ", FR: "Muhammad ⚘" } }
    ];

    /* === TEXTES D'INTRODUCTION CORRIGÉS (Clairs et Simples) === */
    const introTexts = {
      EN: "As the day ends and the lights grow soft, it is time for our stories to begin. 🕊️<br>This is where we gather for our special ritual to hear about the Prophets. These are simple stories of kindness and courage that can light up any heart. It is a moment of peace for my little birds, and a quiet light for every path that finds its way here before sleep.",
      FR: "Tandis que le jour s'efface et que la maison s'apaise, le temps des histoires commence enfin. 🕊️<br>C'est le moment où nous nous retrouvons pour ce rituel qui nous est cher, à l'écoute de la vie des Prophètes. Leurs parcours, faits de bonté et de courage, sont des lumières qui parlent à chaque cœur. Un instant de sérénité pour mes petits oisillons, et un souffle de paix pour quiconque s'arrête ici avant de s'endormir.",
      AR: "مع هدوء النهار وبداية السكينة، يحين وقت حكاياتنا. 🕊️<br>هنا نلتفّ معاً في لمّتنا الهادئة لنستحضر سير الأنبياء؛ تلك الرحلات المليئة بالرحمة والعزيمة التي تلمس كل وجدان. هي لحظة صفاء لعصافيري الصغار، ونسمة طمأنينة تسكن القلوب قبل المنام."
    };

    const titleTexts = { EN: "Stories of the Prophets", FR: "L'histoire des Prophètes", AR: "قصص الأنبياء" };
    const modalFooters = { EN: "A legacy of love", FR: "Un héritage d'amour", AR: "أثر من الحب" };

    const grid = document.getElementById('prophetsGrid');
    const modal = document.getElementById('quickViewModal');
    const video = document.getElementById('prophetVideo');
    const videoSource = document.getElementById('videoSource');
    let currentLang = 'EN';

    function renderProphets(lang) {
      grid.innerHTML = '';
      prophetsData.forEach((prophet) => {
        const card = document.createElement('div');
        card.className = 'prophet-card';
        card.innerHTML = `<div class="card-portrait ${prophet.id === 'adam' ? 'portrait-adam' : 'portrait-generic'}"></div>
                          <div class="card-name">${prophet.names[lang]}</div>`;
        
        card.onclick = () => {
          document.getElementById('modalProphetName').textContent = prophet.names[lang];
          document.getElementById('modalFooter').textContent = modalFooters[lang];
          if(prophet.id === 'adam') {
            videoSource.src = "Video EN mp4.mp4";
            video.load();
            document.getElementById('videoContainer').style.display = 'block';
            video.play().catch(error => {
                console.log("Auto-play was prevented by the browser. User interaction needed.");
            });
          } else {
            document.getElementById('videoContainer').style.display = 'none';
          }
          modal.classList.add('active');
        };
        grid.appendChild(card);
      });
    }

    function setLanguage(lang) {
      currentLang = lang;
      document.querySelectorAll('.lang-option').forEach(btn => btn.classList.toggle('active', btn.dataset.lang === lang));
      document.getElementById('mainTitle').innerHTML = `<i class="fas fa-heart heart-icon"></i> ${titleTexts[lang]} <i class="fas fa-heart heart-icon"></i>`;
      document.getElementById('dynamicIntro').innerHTML = introTexts[lang];
      
      const container = document.querySelector('.app-container');
      if(lang === 'AR') { container.classList.add('rtl'); container.setAttribute('dir', 'rtl'); }
      else { container.classList.remove('rtl'); container.setAttribute('dir', 'ltr'); }
      
      renderProphets(lang);
    }

    document.getElementById('langEN').onclick = () => setLanguage('EN');
    document.getElementById('langAR').onclick = () => setLanguage('AR');
    document.getElementById('langFR').onclick = () => setLanguage('FR');
    
    function closeModal() {
        modal.classList.remove('active');
        video.pause();
        video.currentTime = 0; 
    }

    document.getElementById('closeModalBtn').onclick = closeModal;
    modal.onclick = (e) => {
        if (e.target === modal) {
            closeModal();
        }
    };

    setLanguage('EN');
  })();
</script>
</body>
</html>
