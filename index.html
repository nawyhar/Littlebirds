<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Histoires des Prophètes · Odyssée Sacrée</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #0B1320;
      font-family: 'Poppins', sans-serif;
      color: #f0f0f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      background-image: radial-gradient(circle at 30% 40%, rgba(212, 175, 55, 0.08) 0%, transparent 40%),
                        radial-gradient(circle at 80% 70%, rgba(212, 175, 55, 0.05) 0%, transparent 45%),
                        linear-gradient(145deg, #0b1320 0%, #0f1a2b 100%);
    }

    .app-container {
      max-width: 1200px;
      width: 100%;
      margin: 0 auto;
      border-radius: 2.5rem;
      background: rgba(10, 20, 35, 0.35);
      backdrop-filter: blur(4px);
      box-shadow: 0 25px 50px -8px rgba(0,0,0,0.8), 0 0 0 1px rgba(212, 175, 55, 0.25) inset;
      overflow: hidden;
      padding: 2rem 1.5rem;
    }

    /* GLOBE EN HAUT */
    .global-header {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 2.5rem;
      position: relative;
    }

    .globe-icon {
      font-size: 4rem;
      color: #D4AF37;
      filter: drop-shadow(0 0 30px #f5c542);
      animation: rotateGlobe 20s infinite linear;
      margin-bottom: 0.8rem;
    }

    @keyframes rotateGlobe {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .language-selector {
      display: flex;
      gap: 2rem;
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(10px);
      padding: 0.8rem 2rem;
      border-radius: 4rem;
      border: 1px solid #D4AF37;
      box-shadow: 0 0 30px rgba(212, 175, 55, 0.3);
    }

    .lang-option {
      font-family: 'Cinzel', serif;
      font-size: 1.8rem;
      font-weight: 700;
      color: #D4AF37;
      cursor: pointer;
      padding: 0 0.5rem;
      transition: all 0.2s;
      text-shadow: 0 0 10px gold;
      background: none;
      border: none;
    }

    .lang-option:hover {
      transform: scale(1.2);
      text-shadow: 0 0 30px #ffd966;
    }

    .lang-option.active {
      color: #fff2bf;
      text-shadow: 0 0 30px #f5e56b;
      border-bottom: 2px solid #fff2bf;
    }

    /* TITRE INTRO */
    .intro-section {
      text-align: center;
      margin-bottom: 2.5rem;
      padding: 0 1rem;
    }

    .intro-title {
      font-family: 'Cinzel', serif;
      font-size: 2.2rem;
      color: #D4AF37;
      margin-bottom: 1rem;
      letter-spacing: 0.2rem;
      text-shadow: 0 0 20px gold;
    }

    .intro-text {
      font-size: 1.2rem;
      line-height: 1.8;
      max-width: 800px;
      margin: 0 auto;
      background: rgba(0, 0, 0, 0.3);
      padding: 1.5rem;
      border-radius: 3rem;
      border-left: 5px solid #D4AF37;
      border-right: 5px solid #D4AF37;
      backdrop-filter: blur(5px);
      font-style: italic;
    }

    /* GRILLE DES PROPHÈTES - 2 CARTES PAR LIGNE */
    .prophets-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1.5rem;
      max-width: 900px;
      margin: 0 auto;
      padding: 1rem;
    }

    .prophet-card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 2px solid #D4AF37;
      border-radius: 1.8rem;
      padding: 1.2rem 1rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: all 0.3s cubic-bezier(0.2, 0.9, 0.3, 1.1);
      box-shadow: 0 10px 25px -5px rgba(0,0,0,0.8), 0 0 0 1px #D4AF37 inset, 0 0 15px rgba(212,175,55,0.3);
      cursor: pointer;
    }

    .prophet-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 25px 35px -8px black, 0 0 35px #D4AF37, 0 0 0 2px #f5d76e inset;
      border-color: #fae28b;
    }

    .card-portrait {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      border: 3px solid #D4AF37;
      box-shadow: 0 0 30px #D4AF37, 0 5px 15px black;
      margin-bottom: 0.8rem;
      background-size: cover;
      background-position: center;
      background-color: #1e2a3a;
    }

    /* Portraits variés (SVG symboliques) */
    .portrait-1 { background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="45" fill="%23c29a64"/><circle cx="35" cy="40" r="6" fill="%23332"/><circle cx="65" cy="40" r="6" fill="%23332"/><path d="M30 68 Q50 88,70 68" stroke="%239f6234" stroke-width="5" fill="none"/></svg>'); }
    .portrait-2 { background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="45" fill="%23b58450"/><circle cx="35" cy="40" r="6" fill="%23332"/><circle cx="65" cy="40" r="6" fill="%23332"/><path d="M30 68 Q50 86,70 68" stroke="%23945e36" stroke-width="5" fill="none"/></svg>'); }
    .portrait-3 { background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="45" fill="%23b07c48"/><circle cx="35" cy="40" r="6" fill="%23332"/><circle cx="65" cy="40" r="6" fill="%23332"/><path d="M30 68 Q50 90,70 68" stroke="%238a572c" stroke-width="5" fill="none"/></svg>'); }
    .portrait-4 { background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="45" fill="%23cfa269"/><circle cx="35" cy="40" r="6" fill="%23332"/><circle cx="65" cy="40" r="6" fill="%23332"/><path d="M30 68 Q50 84,70 68" stroke="%23ac703e" stroke-width="5" fill="none"/></svg>'); }
    .portrait-5 { background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="45" fill="%23b98d58"/><circle cx="35" cy="40" r="6" fill="%23332"/><circle cx="65" cy="40" r="6" fill="%23332"/><path d="M30 68 Q50 87,70 68" stroke="%239b6435" stroke-width="5" fill="none"/></svg>'); }
    .portrait-6 { background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="45" fill="%23c09460"/><circle cx="35" cy="40" r="6" fill="%23332"/><circle cx="65" cy="40" r="6" fill="%23332"/><path d="M30 68 Q50 83,70 68" stroke="%239a6437" stroke-width="5" fill="none"/></svg>'); }

    .card-name {
      font-family: 'Cinzel', serif;
      font-size: 1.2rem;
      font-weight: 700;
      color: #D4AF37;
      text-shadow: 0 0 10px #f5c542;
      text-align: center;
      line-height: 1.4;
    }

    /* Modal */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background-color: rgba(0,0,0,0.7);
      backdrop-filter: blur(12px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      visibility: hidden;
      opacity: 0;
      transition: 0.25s ease;
    }

    .modal-overlay.active {
      visibility: visible;
      opacity: 1;
    }

    .modal-content {
      background: rgba(20, 30, 50, 0.4);
      backdrop-filter: blur(20px);
      border: 2px solid #D4AF37;
      border-radius: 3rem;
      max-width: 500px;
      width: 90%;
      padding: 2rem;
      box-shadow: 0 50px 80px -20px black, 0 0 70px #D4AF37;
      text-align: center;
      position: relative;
    }

    .close-modal {
      position: absolute;
      top: 1.5rem; right: 2rem;
      background: none;
      border: none;
      font-size: 2.2rem;
      color: #D4AF37;
      cursor: pointer;
    }

    .video-placeholder {
      width: 100%;
      aspect-ratio: 16/9;
      background: radial-gradient(circle at 30% 40%, #aa8745, #1a251c);
      border-radius: 2rem;
      border: 2px solid #D4AF37;
      box-shadow: 0 0 60px #D4AF37;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 1.5rem 0 1rem;
    }

    .play-icon {
      font-size: 4rem;
      color: #D4AF37;
      filter: drop-shadow(0 0 20px gold);
    }

    .modal-title {
      font-family: 'Cinzel', serif;
      font-size: 2.2rem;
      color: #D4AF37;
    }

    /* Mobile */
    @media (max-width: 700px) {
      .prophets-grid {
        grid-template-columns: 1fr;
        gap: 1rem;
      }
      .global-header {
        margin-bottom: 1.5rem;
      }
      .language-selector {
        gap: 1rem;
        padding: 0.5rem 1rem;
      }
      .lang-option {
        font-size: 1.5rem;
      }
    }
  </style>
</head>
<body>
<div class="app-container">
  <!-- GLOBE + LANGUES EN HAUT -->
  <div class="global-header">
    <i class="fas fa-globe-asia globe-icon"></i>
    <div class="language-selector">
      <button class="lang-option active" id="langFR" data-lang="FR">FR</button>
      <button class="lang-option" id="langEN" data-lang="EN">EN</button>
      <button class="lang-option" id="langAR" data-lang="AR">AR</button>
    </div>
  </div>

  <!-- INTRODUCTION DYNAMIQUE -->
  <div class="intro-section">
    <h1 class="intro-title" id="mainTitle">HISTOIRES DES PROPHÈTES</h1>
    <div class="intro-text" id="introParagraph">
      <span id="dynamicIntro">De la création d'Adam au dernier messager Muhammad, plongez dans l'épopée des prophètes à travers les âges. Récits, sagesse et miracles vous attendent dans cette odyssée sacrée.</span>
    </div>
  </div>

  <!-- GRILLE DES PROPHÈTES (ordre exact de l'arbre) -->
  <div class="prophets-grid" id="prophetsGrid">
    <!-- Les cartes seront générées en JS pour respecter l'ordre -->
  </div>
</div>

<!-- MODAL QUICK VIEW -->
<div class="modal-overlay" id="quickViewModal">
  <div class="modal-content">
    <button class="close-modal" id="closeModalBtn"><i class="fas fa-times"></i></button>
    <div class="video-placeholder">
      <i class="fas fa-play play-icon"></i>
    </div>
    <h2 class="modal-title" id="modalProphetName">ADAM</h2>
    <p style="color: #e6d5a8;">Aperçu cinématique · Récit inspirant</p>
  </div>
</div>

<script>
  (function() {
    // ---------- DONNÉES TRILINGUES ----------
    const prophetsData = [
      { id: "adam", names: { FR: "Adam", EN: "Adam", AR: "آدم" } },
      { id: "enoch", names: { FR: "Idris (Enoch)", EN: "Enoch (Idris)", AR: "إدريس" } },
      { id: "noah", names: { FR: "Nūh (Noé)", EN: "Noah (Nuh)", AR: "نوح" } },
      { id: "salih", names: { FR: "Sālih", EN: "Salih", AR: "صالح" } },
      { id: "lot", names: { FR: "Lūt (Lot)", EN: "Lot (Lut)", AR: "لوط" } },
      { id: "hud", names: { FR: "Hūd", EN: "Hud", AR: "هود" } },
      { id: "ibrahim", names: { FR: "Ibrāhīm (Abraham)", EN: "Abraham (Ibrahim)", AR: "إبراهيم" } },
      { id: "shoaib", names: { FR: "Shu‘ayb", EN: "Shuaib", AR: "شعيب" } },
      { id: "ismael", names: { FR: "Ismā‘īl", EN: "Ishmael (Ismail)", AR: "إسماعيل" } },
      { id: "isaac", names: { FR: "Ishāq (Isaac)", EN: "Isaac (Ishaq)", AR: "إسحاق" } },
      { id: "jacob", names: { FR: "Ya‘qūb (Jacob)", EN: "Jacob (Yaqub)", AR: "يعقوب" } },
      { id: "joseph", names: { FR: "Yūsuf (Joseph)", EN: "Joseph (Yusuf)", AR: "يوسف" } },
      { id: "job", names: { FR: "Ayyūb (Job)", EN: "Job (Ayyub)", AR: "أيوب" } },
      { id: "moses", names: { FR: "Mūsā & Hārūn", EN: "Moses & Aaron", AR: "موسى وهارون" } },
      { id: "ezekiel", names: { FR: "Dhūl-Kifl (Ézéchiel)", EN: "Ezekiel (Dhul-Kifl)", AR: "ذو الكفل" } },
      { id: "elijah", names: { FR: "Ilyās & Alyasa‘", EN: "Elijah & Elisha", AR: "إلياس واليسع" } },
      { id: "jonah", names: { FR: "Yūnus (Jonas)", EN: "Jonah (Yunus)", AR: "يونس" } },
      { id: "david", names: { FR: "Dāwūd & Sulaymān", EN: "David & Solomon", AR: "داود وسليمان" } },
      { id: "zakaria", names: { FR: "Zakariyyā & Yahyā", EN: "Zechariah & John", AR: "زكريا ويحيى" } },
      { id: "jesus", names: { FR: "‘Īsā (Jésus)", EN: "Jesus (Isa)", AR: "عيسى" } },
      { id: "muhammad", names: { FR: "Muhammad ⚘", EN: "Muhammad ⚘", AR: "محمد ﷺ" } }
    ];

    // Portraits cycliques
    const portraitClasses = [
      "portrait-1", "portrait-2", "portrait-3", 
      "portrait-4", "portrait-5", "portrait-6"
    ];

    // Textes d'intro par langue
    const introTexts = {
      FR: "✨ De la création d'Adam au dernier messager Muhammad, plongez dans l'épopée des prophètes à travers les âges. Récits, sagesse et miracles vous attendent dans cette odyssée sacrée.",
      EN: "✨ From the creation of Adam to the final messenger Muhammad, dive into the epic of the prophets through the ages. Stories, wisdom and miracles await in this sacred odyssey.",
      AR: "✨ من خلق آدم إلى الرسول الأخير محمد، انغمس في ملحمة الأنبياء عبر العصور. قصص وحكم ومعجزات تنتظركم في هذه الرحلة المباركة."
    };

    const titleTexts = {
      FR: "HISTOIRES DES PROPHÈTES",
      EN: "STORIES OF THE PROPHETS",
      AR: "قصص الأنبياء"
    };

    // Éléments DOM
    const grid = document.getElementById('prophetsGrid');
    const modal = document.getElementById('quickViewModal');
    const modalName = document.getElementById('modalProphetName');
    const closeBtn = document.getElementById('closeModalBtn');
    const introSpan = document.getElementById('dynamicIntro');
    const mainTitle = document.getElementById('mainTitle');

    let currentLang = 'FR';

    // Fonction pour générer les cartes selon la langue
    function renderProphets(lang) {
      grid.innerHTML = ''; // vide la grille
      prophetsData.forEach((prophet, index) => {
        const card = document.createElement('div');
        card.className = 'prophet-card';
        card.setAttribute('data-prophet-id', prophet.id);

        const portraitDiv = document.createElement('div');
        portraitDiv.className = `card-portrait ${portraitClasses[index % portraitClasses.length]}`;

        const nameDiv = document.createElement('div');
        nameDiv.className = 'card-name';
        nameDiv.textContent = prophet.names[lang] || prophet.names.FR; // fallback FR

        card.appendChild(portraitDiv);
        card.appendChild(nameDiv);

        // Event pour ouvrir modal
        card.addEventListener('click', () => {
          modalName.textContent = prophet.names[lang];
          modal.classList.add('active');
        });

        grid.appendChild(card);
      });
    }

    // Mise à jour de la langue
    function setLanguage(lang) {
      currentLang = lang;
      
      // Mettre à jour les classes actives des boutons
      document.querySelectorAll('.lang-option').forEach(btn => {
        if (btn.dataset.lang === lang) {
          btn.classList.add('active');
        } else {
          btn.classList.remove('active');
        }
      });

      // Texte intro et titre
      introSpan.textContent = introTexts[lang] || introTexts.FR;
      mainTitle.textContent = titleTexts[lang] || titleTexts.FR;

      // Re-rendre les cartes
      renderProphets(lang);
    }

    // Initialisation FR
    setLanguage('FR');

    // Écouteurs sur les boutons de langue
    document.getElementById('langFR').addEventListener('click', () => setLanguage('FR'));
    document.getElementById('langEN').addEventListener('click', () => setLanguage('EN'));
    document.getElementById('langAR').addEventListener('click', () => setLanguage('AR'));

    // Modal close
    closeBtn.addEventListener('click', () => modal.classList.remove('active'));
    modal.addEventListener('click', (e) => {
      if (e.target === modal) modal.classList.remove('active');
    });

  })();
</script>
</body>
</html>
