<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Histoires des Prophètes · Celestial Gold</title>
  <!-- Fonts & icons (Font Awesome for play button) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #0b0c1a; /* deep midnight base */
      font-family: 'Cormorant Garamond', 'Times New Roman', serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    /* 4K friendly container */
    .responsive-showcase {
      max-width: 1800px;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 3rem;
    }

    /* === laptop / desktop mock (21:9 vibe) === */
    .laptop-view {
      width: 100%;
      background: radial-gradient(ellipse at 30% 40%, #1a1f2f, #030514 90%);
      border-radius: 2.5rem;
      padding: 2rem 2rem 2.5rem 2rem;
      box-shadow: 0 30px 50px rgba(0,0,0,0.9), 0 0 0 2px rgba(212, 175, 55, 0.15) inset, 0 0 40px #ffd96625;
      backdrop-filter: blur(2px);
      position: relative;
      overflow: hidden;
    }

    /* golden sparks / dust particles (pure css) */
    .laptop-view::before {
      content: '';
      position: absolute;
      inset: 0;
      background: url('data:image/svg+xml;utf8,<svg width="100%" height="100%" viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg"><circle cx="15%" cy="22%" r="2" fill="%23eab308" opacity="0.5"><animate attributeName="opacity" values="0.2;0.8;0.2" dur="6s" repeatCount="indefinite" /></circle><circle cx="87%" cy="45%" r="3" fill="%23fbbf24" opacity="0.4"><animate attributeName="opacity" values="0.3;0.9;0.3" dur="5s" repeatCount="indefinite" /></circle><circle cx="44%" cy="81%" r="2" fill="%23ffd966" opacity="0.5"><animate attributeName="r" values="1;3;1" dur="4s" repeatCount="indefinite" /></circle><circle cx="71%" cy="13%" r="2" fill="%23d4a017" opacity="0.3"><animate attributeName="opacity" values="0.1;0.7;0.1" dur="7s" repeatCount="indefinite" /></circle><circle cx="8%" cy="67%" r="3" fill="%23eab308" opacity="0.5"><animate attributeName="r" values="2;4;2" dur="6s" repeatCount="indefinite" /></circle><circle cx="93%" cy="92%" r="2" fill="%23f5c542" opacity="0.6"><animate attributeName="opacity" values="0.2;1;0.2" dur="8s" repeatCount="indefinite" /></circle><circle cx="33%" cy="5%" r="3" fill="%23ffd966" opacity="0.3"><animate attributeName="r" values="2;5;2" dur="9s" repeatCount="indefinite" /></circle></svg>');
      background-size: cover;
      pointer-events: none;
      z-index: 2;
      mix-blend-mode: screen;
    }

    /* main grid layout (laptop) */
    .dashboard {
      display: grid;
      grid-template-columns: 280px 1fr 120px;
      gap: 1.8rem;
      position: relative;
      z-index: 10;
    }

    /* ----- left sidebar (family tree, hexagonal nodes) ----- */
    .family-tree {
      background: rgba(5, 10, 24, 0.5);
      backdrop-filter: blur(4px);
      border-radius: 2rem;
      padding: 2rem 1rem;
      box-shadow: 0 20px 40px -10px black, 0 0 0 1px #d4af3780 inset;
      display: flex;
      flex-direction: column;
      gap: 2.5rem;
      position: relative;
    }

    /* golden glowing line (connector) */
    .tree-line {
      position: absolute;
      width: 4px;
      background: linear-gradient(180deg, transparent, #f5c542, #b8860b, #f5c542, transparent);
      left: 50%;
      transform: translateX(-50%);
      top: 5%;
      height: 90%;
      border-radius: 4px;
      box-shadow: 0 0 20px #ffbf00, 0 0 40px #d4a017;
      z-index: 0;
    }

    .hex-node {
      position: relative;
      z-index: 5;
      display: flex;
      flex-direction: column;
      align-items: center;
      margin: 0.2rem 0;
    }

    /* hexagon shaped container */
    .hex {
      width: 100px;
      height: 110px;
      background: #0f1424;
      clip-path: polygon(25% 0%, 75% 0%, 100% 25%, 100% 75%, 75% 100%, 25% 100%, 0% 75%, 0% 25%);
      border: 2px solid #d4af37;
      box-shadow: 0 0 30px #eab308, 0 0 10px #ffd966 inset;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 5px;
      transition: all 0.3s;
    }

    .hex:hover {
      border-color: #fff3b0;
      box-shadow: 0 0 45px #f5c542;
    }

    /* realistic, cinematic portrait (simulated with gradients & emojis? but we use images via css) */
    .prophet-portrait {
      width: 94px;
      height: 100px;
      clip-path: polygon(24% 0%, 76% 0%, 100% 24%, 100% 76%, 76% 100%, 24% 100%, 0% 76%, 0% 24%);
      background-size: cover;
      background-position: center 20%;
      background-repeat: no-repeat;
      background-color: #2c2416;
      box-shadow: inset 0 0 30px #e5b13b, 0 4px 10px rgba(0,0,0,0.7);
    }

    /* unique portraits for each prophet (cinematic style) — we use different background images generated with gradients & filters to mimic realistic paintings */
    .portrait-adam {
      background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 120"><rect width="100" height="120" fill="%233d2e1b"/><circle cx="50" cy="45" r="25" fill="%23c69c6d"/><ellipse cx="45" cy="40" rx="4" ry="5" fill="%23332"/><ellipse cx="55" cy="40" rx="4" ry="5" fill="%23332"/><path d="M40 60 Q50 75,60 60" stroke="%23b87c4b" stroke-width="3" fill="none"/><rect x="40" y="70" width="20" height="30" fill="%23543e1f"/></svg>');
      background-size: cover;
    }
    .portrait-idris {
      background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 120"><rect width="100" height="120" fill="%232f2a1f"/><circle cx="50" cy="45" r="25" fill="%23dbb484"/><ellipse cx="45" cy="40" rx="4" ry="5" fill="%23222"/><ellipse cx="55" cy="40" rx="4" ry="5" fill="%23222"/><path d="M40 60 Q50 80,60 60" stroke="%23945e3a" stroke-width="3" fill="none"/><rect x="42" y="73" width="16" height="25" fill="%235a3e2b"/></svg>');
    }
    .portrait-nuh {
      background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 120"><rect width="100" height="120" fill="%233f2d18"/><circle cx="50" cy="45" r="25" fill="%23be8a5c"/><ellipse cx="45" cy="40" rx="4" ry="5" fill="%23332"/><ellipse cx="55" cy="40" rx="4" ry="5" fill="%23332"/><path d="M40 62 Q50 77,60 62" stroke="%2380522c" stroke-width="3" fill="none"/><rect x="42" y="70" width="16" height="28" fill="%23735237"/></svg>');
    }
    .portrait-ibrahim {
      background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 120"><rect width="100" height="120" fill="%233d2815"/><circle cx="50" cy="45" r="25" fill="%23d7a46b"/><ellipse cx="45" cy="40" rx="4" ry="5" fill="%23332"/><ellipse cx="55" cy="40" rx="4" ry="5" fill="%23332"/><path d="M40 58 Q50 75,60 58" stroke="%23ad6b3c" stroke-width="3" fill="none"/><rect x="42" y="72" width="16" height="28" fill="%237a5837"/></svg>');
    }

    .prophet-name {
      font-size: 1rem;
      letter-spacing: 0.1rem;
      color: #e9d198;
      text-shadow: 0 0 8px #f3ba2f, 0 2px 4px black;
      margin-top: 0.5rem;
      font-weight: 600;
      text-transform: uppercase;
    }

    /* center gallery grid */
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.5rem;
    }

    /* elegant vertical card */
    .gold-card {
      background: rgba(8, 12, 27, 0.7);
      backdrop-filter: blur(6px);
      border: 2px solid #d4af37;
      border-radius: 2rem;
      padding: 1.2rem 0.8rem 1.2rem 0.8rem;
      box-shadow: 0 20px 30px -10px black, 0 0 30px #ffbf0050, 0 0 0 1px #ffd966 inset;
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: 0.2s;
    }

    .gold-card:hover {
      box-shadow: 0 20px 40px -8px #eab308, 0 0 40px #f5c542;
      transform: scale(1.02);
    }

    .card-portrait {
      width: 100%;
      aspect-ratio: 2/3;
      border-radius: 1.5rem;
      background-size: cover;
      background-position: center 30%;
      border: 2px solid #e5b13b;
      box-shadow: inset 0 -30px 40px #00000099, 0 10px 25px black;
      margin-bottom: 1rem;
    }

    /* different portraits for cards */
    .card-adam { background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 140"><rect width="100" height="140" fill="%233a2c18"/><circle cx="50" cy="50" r="35" fill="%23c9a177"/><ellipse cx="40" cy="45" rx="5" ry="6" fill="%23332"/><ellipse cx="60" cy="45" rx="5" ry="6" fill="%23332"/><path d="M35 75 Q50 95,65 75" stroke="%23955e3a" stroke-width="4" fill="none"/><rect x="35" y="85" width="30" height="40" fill="%234f3e28"/></svg>'); }
    .card-idris { background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 140"><rect width="100" height="140" fill="%233a2f1e"/><circle cx="50" cy="50" r="35" fill="%23dab38b"/><ellipse cx="40" cy="45" rx="5" ry="6" fill="%23332"/><ellipse cx="60" cy="45" rx="5" ry="6" fill="%23332"/><path d="M35 78 Q50 98,65 78" stroke="%23a66034" stroke-width="4" fill="none"/><rect x="35" y="85" width="30" height="40" fill="%235d4a2f"/></svg>'); }
    .card-nuh { background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 140"><rect width="100" height="140" fill="%233f2d18"/><circle cx="50" cy="50" r="35" fill="%23cf9f6e"/><ellipse cx="40" cy="45" rx="5" ry="6" fill="%23332"/><ellipse cx="60" cy="45" rx="5" ry="6" fill="%23332"/><path d="M35 74 Q50 96,65 74" stroke="%238d572a" stroke-width="4" fill="none"/><rect x="35" y="85" width="30" height="40" fill="%236d5438"/></svg>'); }
    .card-ibrahim { background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 140"><rect width="100" height="140" fill="%233d2812"/><circle cx="50" cy="50" r="35" fill="%23e0b782"/><ellipse cx="40" cy="45" rx="5" ry="6" fill="%23332"/><ellipse cx="60" cy="45" rx="5" ry="6" fill="%23332"/><path d="M35 72 Q50 94,65 72" stroke="%23b16f3c" stroke-width="4" fill="none"/><rect x="35" y="85" width="30" height="40" fill="%237e623e"/></svg>'); }
    .card-mousa { background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 140"><rect width="100" height="140" fill="%233d2b14"/><circle cx="50" cy="50" r="35" fill="%23ca9e6b"/><ellipse cx="40" cy="45" rx="5" ry="6" fill="%23332"/><ellipse cx="60" cy="45" rx="5" ry="6" fill="%23332"/><path d="M35 75 Q50 97,65 75" stroke="%239f6234" stroke-width="4" fill="none"/><rect x="35" y="85" width="30" height="40" fill="%236b4f31"/></svg>'); }
    .card-issa { background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 140"><rect width="100" height="140" fill="%2338281a"/><circle cx="50" cy="50" r="35" fill="%23d9aa75"/><ellipse cx="40" cy="45" rx="5" ry="6" fill="%23332"/><ellipse cx="60" cy="45" rx="5" ry="6" fill="%23332"/><path d="M35 70 Q50 92,65 70" stroke="%23b17444" stroke-width="4" fill="none"/><rect x="35" y="85" width="30" height="40" fill="%23745537"/></svg>'); }

    .card-title {
      font-size: 1.8rem;
      color: #ecd99b;
      text-shadow: 0 0 10px gold, 0 2px 5px black;
      font-weight: 600;
      border-top: 1px solid #d4af37;
      border-bottom: 1px solid #d4af37;
      padding: 0.3rem 0;
      width: 100%;
      text-align: center;
      font-family: 'Cormorant Garamond', serif;
    }

    /* right sidebar language selector */
    .lang-sidebar {
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(8px);
      border-radius: 3rem;
      padding: 2rem 0.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2.5rem;
      border: 1px solid #d4af3760;
      box-shadow: 0 0 30px #d4af3720;
    }

    .lang-item {
      writing-mode: vertical-rl;
      transform: rotate(180deg);
      font-size: 1.5rem;
      font-weight: 700;
      color: #e6c27a;
      text-shadow: 0 0 15px #eab308;
      letter-spacing: 0.3rem;
      cursor: default;
      transition: 0.2s;
      padding: 0.5rem 0;
      border-radius: 30px;
    }

    .lang-item:hover {
      text-shadow: 0 0 30px #ffd966;
      color: #f5e1a8;
      transform: rotate(180deg) scale(1.1);
    }

    /* ---------- Pop-up Quick View (glassmorphism + desert) ---------- */
    .popup-quickview {
      position: absolute;
      top: 15%;
      left: 40%;
      width: 400px;
      background: rgba(10, 18, 30, 0.5);
      backdrop-filter: blur(20px);
      border-radius: 3rem;
      border: 2px solid #e9c576;
      box-shadow: 0 30px 60px black, 0 0 80px #ffd966, 0 0 0 1px #ffdb9d inset;
      padding: 1.5rem;
      z-index: 50;
      transform: perspective(1200px) rotateY(-2deg) rotateX(2deg);
      animation: floatGlow 5s infinite alternate ease-in-out;
    }

    @keyframes floatGlow {
      0% { box-shadow: 0 30px 60px black, 0 0 50px #d4a017, 0 0 0 1px #f3c26b inset; transform: perspective(1200px) rotateY(-2deg) rotateX(2deg) translateY(0); }
      100% { box-shadow: 0 40px 70px black, 0 0 90px #f5c542, 0 0 0 2px #ffecb3 inset; transform: perspective(1200px) rotateY(-3deg) rotateX(3deg) translateY(-8px); }
    }

    .desert-scene {
      width: 100%;
      height: 180px;
      border-radius: 2rem;
      background: radial-gradient(circle at 30% 80%, #c9a52c, #6d4c1a, #2c2410);
      box-shadow: 0 10px 20px black, 0 0 50px #f1c40f;
      position: relative;
      border: 1px solid #e9b13b;
      overflow: hidden;
    }
    /* dunes */
    .desert-scene::after {
      content: '';
      position: absolute;
      bottom: 0;
      width: 100%;
      height: 70px;
      background: linear-gradient(180deg, transparent, #b47d40 70%, #7a561f);
      border-radius: 50% 50% 0 0;
    }

    .play-button {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: #d4af37dd;
      width: 70px;
      height: 70px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.2rem;
      color: #0b0c1a;
      box-shadow: 0 0 50px #f1c40f, 0 10px 20px black;
      border: 3px solid #fff2bf;
      backdrop-filter: blur(2px);
    }

    .popup-quickview p {
      color: #e9d198;
      font-size: 1.5rem;
      text-align: center;
      margin: 1rem 0 0 0;
      text-shadow: 0 0 15px gold;
    }

    /* ----- iPhone mock (responsive) ----- */
    .iphone-view {
      width: 100%;
      display: flex;
      justify-content: center;
      margin-top: 1rem;
    }

    .iphone-frame {
      width: 360px;
      background: #0c0f1c;
      border-radius: 3rem;
      padding: 1.5rem 1rem;
      border: 2px solid #d4af37;
      box-shadow: 0 0 70px #eab308, 0 30px 40px black;
      backdrop-filter: blur(10px);
      position: relative;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    /* compact family tree row */
    .mobile-tree {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.6rem;
      background: #02061780;
      border-radius: 2rem;
      padding: 1rem 0.5rem;
      border: 1px solid #d4af37;
    }

    .mobile-hex {
      width: 70px;
      height: 75px;
      clip-path: polygon(25% 0%, 75% 0%, 100% 25%, 100% 75%, 75% 100%, 25% 100%, 0% 75%, 0% 25%);
      background-size: cover;
      border: 2px solid #f3ba2f;
    }

    .mobile-gallery {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 0.8rem;
    }

    .mobile-card {
      background: #0f1424d9;
      border: 1px solid #dbaa37;
      border-radius: 1.2rem;
      padding: 0.5rem;
    }

    .mobile-card .card-portrait {
      aspect-ratio: 1/1.4;
    }

    .mobile-lang {
      flex-direction: row;
      justify-content: space-around;
      display: flex;
      padding: 0.5rem;
    }

    .mobile-lang span {
      writing-mode: horizontal-tb;
      transform: none;
      font-size: 1.2rem;
    }

    .iphone-popup-preview {
      background: #1d2338b0;
      backdrop-filter: blur(20px);
      border-radius: 2rem;
      border: 1px solid #eab308;
      padding: 0.8rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .iphone-desert {
      width: 80px;
      height: 80px;
      border-radius: 1rem;
      background: #b68b40;
      position: relative;
    }

    .iphone-play {
      font-size: 2rem;
      color: gold;
    }

    /* global text styles */
    h3, h4 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 500;
    }

    .footnote {
      color: #c7b07b;
      text-align: center;
      margin-top: 2rem;
      font-size: 1.4rem;
      text-shadow: 0 0 8px #f5cb5c;
      letter-spacing: 4px;
    }
  </style>
</head>
<body>
<div class="responsive-showcase">
  <!-- LAPTOP VERSION (4K / desktop) -->
  <div class="laptop-view">
    <div class="dashboard">
      <!-- LEFT SIDEBAR : family tree glowing -->
      <div class="family-tree">
        <div class="tree-line"></div> <!-- golden connector line -->
        <div class="hex-node">
          <div class="hex"><div class="prophet-portrait portrait-adam"></div></div>
          <span class="prophet-name">ADAM</span>
        </div>
        <div class="hex-node">
          <div class="hex"><div class="prophet-portrait portrait-idris"></div></div>
          <span class="prophet-name">IDRIS</span>
        </div>
        <div class="hex-node">
          <div class="hex"><div class="prophet-portrait portrait-nuh"></div></div>
          <span class="prophet-name">NŪH</span>
        </div>
        <div class="hex-node">
          <div class="hex"><div class="prophet-portrait portrait-ibrahim"></div></div>
          <span class="prophet-name">IBRĀHĪM</span>
        </div>
        <div class="hex-node">
          <div class="hex"><div class="prophet-portrait portrait-adam" style="background-position: center;"></div></div>
          <span class="prophet-name">MŪSĀ</span>
        </div>
        <div class="hex-node">
          <div class="hex"><div class="prophet-portrait portrait-idris"></div></div>
          <span class="prophet-name">‘ĪSĀ</span>
        </div>
      </div>

      <!-- CENTER GALLERY (grid of ornate cards) -->
      <div class="gallery-grid">
        <div class="gold-card">
          <div class="card-portrait card-adam"></div>
          <div class="card-title">ADAM</div>
        </div>
        <div class="gold-card">
          <div class="card-portrait card-idris"></div>
          <div class="card-title">IDRIS</div>
        </div>
        <div class="gold-card">
          <div class="card-portrait card-nuh"></div>
          <div class="card-title">NŪH</div>
        </div>
        <div class="gold-card">
          <div class="card-portrait card-ibrahim"></div>
          <div class="card-title">IBRĀHĪM</div>
        </div>
        <div class="gold-card">
          <div class="card-portrait card-mousa"></div>
          <div class="card-title">MŪSĀ</div>
        </div>
        <div class="gold-card">
          <div class="card-portrait card-issa"></div>
          <div class="card-title">‘ĪSĀ</div>
        </div>
      </div>

      <!-- RIGHT SIDEBAR : language -->
      <div class="lang-sidebar">
        <span class="lang-item">FR</span>
        <span class="lang-item">EN</span>
        <span class="lang-item">AR</span>
      </div>
    </div>

    <!-- POP-UP GLASSMORPHISM QUICK VIEW (overlay) -->
    <div class="popup-quickview">
      <div class="desert-scene">
        <div class="play-button"><i class="fas fa-play"></i></div>
      </div>
      <p>✦ QUR’ĀN 19:16–21 ✦</p>
    </div>
  </div>

  <!-- IPHONE VERSION (responsive comparison) -->
  <div class="iphone-view">
    <div class="iphone-frame">
      <h3 style="color:#e6c27a; text-align:center;">Histoires des Prophètes · mobile</h3>
      <!-- tree mini -->
      <div class="mobile-tree">
        <div class="mobile-hex portrait-adam"></div>
        <div class="mobile-hex portrait-idris"></div>
        <div class="mobile-hex portrait-nuh"></div>
        <div class="mobile-hex portrait-ibrahim"></div>
      </div>
      <!-- gallery 2x2 -->
      <div class="mobile-gallery">
        <div class="mobile-card"><div class="card-portrait card-adam"></div><div class="card-title" style="font-size:1.2rem;">ADAM</div></div>
